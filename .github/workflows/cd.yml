name: CD – Deploy a Cloud Run

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: flytrack-backend
  IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/flytrack-backend

jobs:
  deploy:
    name: Build Docker + Deploy Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Autenticar con Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configurar gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configurar Docker para Google Container Registry
        run: gcloud auth configure-docker --quiet

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Maven (sin tests — ya pasaron en CI)
        run: ./mvnw --no-transfer-progress package -DskipTests

      - name: Build imagen Docker
        run: docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .

      - name: Push imagen a GCR
        run: |
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy a Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image $IMAGE:${{ github.sha }} \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "DB_NAME=${{ secrets.DB_NAME }}" \
            --set-env-vars "DB_USER=${{ secrets.DB_USER }}" \
            --set-env-vars "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" \
            --set-env-vars "CLOUD_SQL_CONNECTION_NAME=${{ secrets.CLOUD_SQL_CONNECTION_NAME }}" \
            --set-env-vars "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            --set-env-vars "CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}" \
            --set-env-vars "CORS_ALLOWED_METHODS=GET,POST,PUT,DELETE,OPTIONS,PATCH" \
            --set-env-vars "CORS_MAX_AGE=3600" \
            --set-env-vars "MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}" \
            --set-env-vars "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}" \
            --add-cloudsql-instances ${{ secrets.CLOUD_SQL_CONNECTION_NAME }}

      - name: Mostrar URL del servicio
        run: gcloud run services describe $SERVICE_NAME --region $REGION --format "value(status.url)"
