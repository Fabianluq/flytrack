# ===============================
# CONFIGURACIÓN DE BASE DE DATOS
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3308/flytrack?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ===============================
# Muestra las consultas SQL en la consola (muy útil para desarrollo local)
spring.jpa.show-sql=true

# Formatea el SQL en la consola para que sea más fácil de leer
spring.jpa.properties.hibernate.format_sql=true

# Estrategia de generación de tablas (update, create, create-drop, validate, none)
spring.jpa.hibernate.ddl-auto=update

# Dialecto de MySQL (Opcional en versiones recientes de Spring Boot, pero buena práctica)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect