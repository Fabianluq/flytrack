spring.application.name=flytrack

# ── JPA (compartido) ─────────────────────────────────────────────────────────
# El dialecto se detecta automáticamente en Hibernate 6.x — no especificar
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

# ── Base de datos
# En producción (Cloud Run) estas vars vienen del entorno.
# En local se sobreescriben con application-local.properties
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/flytrack?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}

# ── Servidor ─────────────────────────────────────────────────────────────────
server.port=${PORT:8080}
server.address=0.0.0.0
server.forward-headers-strategy=framework
server.tomcat.remoteip.remote-ip-header=x-forwarded-for
server.tomcat.remoteip.protocol-header=x-forwarded-proto


# ── JPA ──────────────────────────────────────────────────────────────────────
# Evita queries durante el render de vistas (buena práctica en APIs REST)
spring.jpa.open-in-view=false

# ── JWT ──────────────────────────────────────────────────────────────────────
# Valor de fallback LOCAL (mínimo 32 chars). En producción se inyecta JWT_SECRET
jwt.secret=${JWT_SECRET:local-dev-secret-key-must-be-at-least-32-chars-long!!}
jwt.access-token-expiration=43200000
jwt.refresh-token-expiration=86400000

# ── CORS ─────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:8080}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
cors.max-age=3600

# ── Correo SMTP ──────────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000