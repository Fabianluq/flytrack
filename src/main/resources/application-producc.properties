# ═══════════════════════════════════════════════════════════════════
# application-producc.properties  ← PERFIL PRODUCCIÓN (Cloud Run + Cloud SQL)
# En Cloud Run NO se activa con -Dspring.profiles.active, sino que
# Cloud Run inyecta las variables de entorno y el Dockerfile lo arranca
# sin perfil → usa application.properties + estas vars de entorno.
#
# Para pruebas manuales de producción:
#   java -jar target/flytrack-*.jar --spring.profiles.active=producc
# ═══════════════════════════════════════════════════════════════════

# ── Base de datos Cloud SQL ──────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql:///${DB_NAME}?cloudSqlInstance=${CLOUD_SQL_CONNECTION_NAME}&socketFactory=com.google.cloud.sql.mysql.SocketFactory
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.show-sql=false

# ── JWT ──────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}

# ── CORS ─────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# ── Correo ───────────────────────────────────────────────────────────────────
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
